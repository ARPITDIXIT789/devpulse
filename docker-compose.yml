version: "3.9"
services:
  db:
    image: postgres:16
    container_name: devpulse-db
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: devpulse-backend
    environment:
      SECRET_KEY: change-me
      JWT_SECRET_KEY: change-me-too
      DATABASE_URL: postgresql://devpulse:devpulse@db:5432/devpulse
      PORT: 5000
      GITHUB_API_URL: https://api.github.com
      GITHUB_TOKEN: ""
      GITHUB_USERNAME: ""
      GITHUB_REPOS: ""
    depends_on:
      - db
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: devpulse-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
